services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        REGISTRY_PREFIX: ${REGISTRY_PREFIX:-harbor.pg.innopolis.university/docker-hub-cache/}
    restart: unless-stopped
    networks:
      - lms-network
    ports:
      - ${BACKEND_HOST_ADDRESS}:${BACKEND_HOST_PORT}:${BACKEND_CONTAINER_PORT}
    expose:
      - ${BACKEND_CONTAINER_PORT}
    environment:
      - NAME=${BACKEND_NAME}
      - DEBUG=${BACKEND_DEBUG}
      - ADDRESS=${BACKEND_CONTAINER_ADDRESS}
      - PORT=${BACKEND_CONTAINER_PORT}
      - LMS_API_KEY=${LMS_API_KEY}
      - BACKEND_ENABLE_INTERACTIONS=${BACKEND_ENABLE_INTERACTIONS}
      - BACKEND_ENABLE_LEARNERS=${BACKEND_ENABLE_LEARNERS}
      - AUTOCHECKER_API_URL=${AUTOCHECKER_API_URL}
      - AUTOCHECKER_API_LOGIN=${AUTOCHECKER_API_LOGIN}
      - AUTOCHECKER_API_PASSWORD=${AUTOCHECKER_API_PASSWORD}
      - DB_HOST=${CONST_POSTGRESQL_SERVICE_NAME}
      - DB_PORT=${CONST_POSTGRESQL_DEFAULT_PORT}
      - DB_NAME=${POSTGRES_DB}
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: ${REGISTRY_PREFIX:-harbor.pg.innopolis.university/docker-hub-cache/}postgres:18.3-alpine
    restart: unless-stopped
    networks:
      - lms-network
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - ${POSTGRES_HOST_ADDRESS}:${POSTGRES_HOST_PORT}:${CONST_POSTGRESQL_DEFAULT_PORT}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/app/data/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: ${REGISTRY_PREFIX:-harbor.pg.innopolis.university/docker-hub-cache/}dpage/pgadmin4:latest
    restart: unless-stopped
    networks:
      - lms-network
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASSWORD}
      - SCRIPT_NAME=/utils/pgadmin
    ports:
      - ${PGADMIN_HOST_ADDRESS}:${PGADMIN_HOST_PORT}:80
    depends_on:
      postgres:
        condition: service_healthy

  caddy:
    build:
      context: frontend/
      args:
        REGISTRY_PREFIX: ${REGISTRY_PREFIX:-harbor.pg.innopolis.university/docker-hub-cache/}
    networks:
      - lms-network
    depends_on:
      - backend
    environment:
      - CADDY_CONTAINER_PORT=${CADDY_CONTAINER_PORT}
      - BACKEND_CONTAINER_PORT=${BACKEND_CONTAINER_PORT}
      - QWEN_CODE_API_URL=${QWEN_CODE_API_URL}
    ports:
      - ${LMS_API_HOST_ADDRESS}:${LMS_API_HOST_PORT}:${CADDY_CONTAINER_PORT}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile

  bot:
    build:
      context: .
      dockerfile: bot/Dockerfile
    restart: unless-stopped
    networks:
      - lms-network
    env_file:
      - .env.bot.secret
    depends_on:
      - backend

volumes:
  postgres_data:

networks:
  lms-network:
    name: lms-network
    attachable: true